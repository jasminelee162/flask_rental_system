<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>系统开始界面</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            background: url('/static/img/welcome.png') no-repeat center center fixed;
            background-size: cover; /* ← 关键：拉伸背景图铺满整个屏幕 */
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.4);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .center-text {
            position: absolute;
            top: 70px;
            width: 100%;
            text-align: center;
            font-size: 60px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .header img {
            height: 50px;
            margin-left: 20px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin-bottom: 80px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-guest {
            background-color: #3498db;
        }

        .btn-guest:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .btn-admin {
            background-color: #e74c3c;
        }

        .btn-admin:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .btn-user {
            background-color: #2ecc71;
        }

        .btn-user:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <!-- 顶部居中欢迎语 -->
    <div class="center-text">此心安处是吾乡</div>

    <div class="container">
        <!-- Logo可选保留 -->
        <div class="header">
            <img src="/static/img/logo.png" alt="Logo">
        </div>

        <!-- 底部按钮 -->
        <div class="button-group">
            <a href="{{ url_for('admin_page.dashboard') }}" class="btn btn-admin">管理员模式</a>
            <a href="{{ url_for('user_page.login') }}" class="btn btn-business">商家模式</a>
            <a href="/user" class="btn btn-user">用户模式</a>
        </div>
    </div>
</body>
</html>
