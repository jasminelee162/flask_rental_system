{% extends "base.html" %}
{% block content %}
<div class="container" style="margin-top: 50px;">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h4>提交反馈</h4>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('user_page.submit_feedback') }}" method="POST">
                        <input type="hidden" name="house_id" value="{{ house.id }}">
                        
                        <div class="form-group">
                            <label>反馈类型</label>
                            <select class="form-control" name="message_type" required>
                                <option value="">-- 请选择 --</option>
                                <option value="repair">维修</option>
                                <option value="complaint">投诉</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>反馈内容</label>
                            <textarea class="form-control" name="message_text" rows="5" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>房源信息</label>
                            <div class="form-control" style="background-color: #f8f9fa;">
                                <p>{{ house.region }} - {{house.block}} - {{house.address}}</p>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">提交反馈</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
