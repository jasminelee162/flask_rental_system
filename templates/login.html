{% extends "base.html" %}

{% block title %}登录 - 房屋租赁系统{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-header">
                    <h3 class="text-center">用户登录</h3>
                </div>
                <div class="card-body">
                    <form id="loginform" method="post" action="{{ url_for('user_page.login') }}">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="captcha">验证码</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="captcha" name="captcha" required>
                                <div class="input-group-append">
                                    <img src="{{ url_for('user_page.get_captcha') }}" class="captcha-img" alt="验证码" onclick="this.src='{{ url_for('user_page.get_captcha') }}?'+Math.random()">
                                </div>
                            </div>
                        </div>
                        <div class="form-group text-center">
                            <button type="button" id="login-btn" class="btn btn-primary">登录</button>
                            <a href="{{ url_for('index_page.index') }}" class="btn btn-secondary">返回首页</a>
                        </div>
                        <div class="text-center">
                            <p>还没有账号？<a href="#" data-toggle="modal" data-target="#registerModal">立即注册</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- 引入必要的JavaScript文件 -->
<script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<script src="https://cdn.bootcss.com/jquery.bootstrapvalidator/0.5.3/js/bootstrapValidator.min.js"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
