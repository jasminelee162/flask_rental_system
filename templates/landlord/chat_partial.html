{% extends "base.html" %}

{% block content %}

<div class="container chat-container">
  <div class="chat-users">
    <div class="chat-users-header">
      <span class="chat-icon">📇</span> 联系人
    </div>
    <div id="chat-user-list">
      加载中...
    </div>
  </div>
  <div class="chat-messages">
    <h5 id="chat-user-name">请选择联系人</h5>
    <div class="message-box" id="chat-messages">
      <!-- 聊天记录 -->
    </div>
    <div class="chat-input">
      <input id="chat-input-text" class="form-control" placeholder="输入消息">
      <button id="send-message" class="btn">发送</button>
    </div>
  </div>
</div>

<script>
  const currentUserId = parseInt(getCookie('userId'));

  function getCookie(name) {
    const value = "; " + document.cookie;
    const parts = value.split("; " + name + "=");
    if (parts.length === 2) return parts.pop().split(";").shift();
  }

  function loadUserList() {
    fetch('/chat/list')
      .then(res => res.json())
      .then(users => {
        const listDiv = document.getElementById('chat-user-list');
        listDiv.innerHTML = '';
        users.forEach(u => {
          const item = document.createElement('div');
          item.textContent = u.name;
          item.style.cursor = 'pointer';
          item.style.padding = '5px';
          item.style.borderBottom = '1px solid #555';
          item.onclick = () => loadChat(u.id, u.name);
          listDiv.appendChild(item);
        });
      });
  }

  function loadChat(targetId, targetName) {
  document.getElementById('chat-user-name').textContent = targetName;
  document.getElementById('send-message').setAttribute('data-target-id', targetId);
  fetch(`/chat/messages?target_id=${targetId}`)
    .then(res => res.json())
    .then(messages => {
      const box = document.getElementById('chat-messages');
      box.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.classList.add('message-bubble');
        if (msg.sender === currentUserId) {
          div.classList.add('sent'); // 我发的
          div.textContent = msg.message;
        } else {
          div.classList.add('received'); // 对方发的
          div.textContent = msg.message;
        }
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    });
}

  document.getElementById('send-message').onclick = function () {
    const input = document.getElementById('chat-input-text');
    const message = input.value.trim();
    const targetId = this.getAttribute('data-target-id');
    if (!message || !targetId) return;

    fetch('/chat/send', {
      method: 'POST',
      body: new URLSearchParams({
        message,
        receiver_id: targetId
      })
    }).then(res => res.json())
      .then(res => {
        if (res.status === 'ok') {
          input.value = '';
          loadChat(targetId, document.getElementById('chat-user-name').textContent);
        }
      });
  };

  loadUserList();
</script>

<style>
  .chat-container {
    display: flex;
    height: 90vh;
    margin-top: 20px;
  }
  .chat-users {
    width: 25%;
    background-color: #2c2c2c;
    border-right: 1px solid #444;
    overflow-y: auto;
    padding: 10px;
  }
  .chat-messages {
    width: 75%;
    display: flex;
    flex-direction: column;
    padding: 10px;
  }
  .message-box {
    flex: 1;
    overflow-y: auto;
    background-color: #2a2a2a;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
  }
  .chat-input {
    display: flex;
    gap: 10px;
  }
  .chat-input input {
    background-color: #333;
    border: 1px solid #555;
    color: white;
  }
  .chat-input button {
    background-color: #8e44ad;
    color: white;
    border: none;
  }
  .chat-users {
  width: 25%;
  background-color: #1e1e1e;
  border-right: 1px solid #444;
  overflow-y: auto;
  padding: 10px;
  color: #eee; /* 联系人文字颜色 */
  font-weight: 500;
}

.chat-users div {
  cursor: pointer;
  padding: 8px 10px;
  border-bottom: 1px solid #444;
  transition: background-color 0.3s;
}

.chat-users div:hover {
  background-color: #555; /* 悬浮时高亮 */
  color: white;
}

.message-box {
  flex: 1;
  overflow-y: auto;
  background-color: #121212;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.message-bubble {
  max-width: 60%;
  padding: 10px 15px;
  border-radius: 15px;
  font-size: 14px;
  line-height: 1.4;
  word-wrap: break-word;
  color: white;
}

.message-bubble.sent {
  background-color: #8e44ad; /* 紫色 */
  align-self: flex-end;
  border-bottom-right-radius: 0;
}

.message-bubble.received {
  background-color: #555; /* 灰色 */
  align-self: flex-start;
  border-bottom-left-radius: 0;
}


.chat-users {
  width: 25%;
  max-height: 90vh;   /* 限制最大高度，避免太长 */
  background-color: #1e1e1e;
  border-right: 1px solid #444;
  overflow-y: auto;
  padding: 10px;
  color: #eee;
  font-weight: 500;
  display: flex;
  flex-direction: column;
}

.chat-users-header {
  font-size: 18px;
  font-weight: 700;
  padding-bottom: 10px;
  border-bottom: 1px solid #444;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}

.chat-icon {
  font-size: 20px;
}

/* 联系人项仍旧 */
.chat-users > div:not(.chat-users-header) {
  cursor: pointer;
  padding: 8px 10px;
  border-bottom: 1px solid #444;
  transition: background-color 0.3s;
  color: #eee;
}

.chat-users > div:not(.chat-users-header):hover {
  background-color: #555;
  color: white;
}

.chat-input {
  display: flex;
  gap: 10px;
}

.chat-input input {
  background-color: #333;
  border: 1px solid #555;
  color: white;
  flex: 1; /* 输入框撑满剩余宽度 */
  min-width: 0;
}

.chat-input button {
  background-color: #8e44ad;
  color: white;
  border: none;
  padding: 0 20px;
  white-space: nowrap;  /* 防止文字换行 */
  height: 38px;
  cursor: pointer;
  user-select: none;
  border-radius: 4px;
}


</style>
{% endblock %}
