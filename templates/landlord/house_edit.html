{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>编辑房源信息</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="{{ url_for('landlord_page.edit_house', house_id=house.id) }}" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="title">标题 *</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ house.title }}" required>
                </div>
                
                <div class="form-group">
                    <label for="rooms">户型 *</label>
                    <select class="form-control" id="rooms" name="rooms" required>
                        <option value="1室1厅" {% if house.rooms == '1室1厅' %}selected{% endif %}>1室1厅</option>
                        <option value="2室1厅" {% if house.rooms == '2室1厅' %}selected{% endif %}>2室1厅</option>
                        <option value="2室2厅" {% if house.rooms == '2室2厅' %}selected{% endif %}>2室2厅</option>
                        <option value="3室1厅" {% if house.rooms == '3室1厅' %}selected{% endif %}>3室1厅</option>
                        <option value="3室2厅" {% if house.rooms == '3室2厅' %}selected{% endif %}>3室2厅</option>
                        <option value="4室2厅" {% if house.rooms == '4室2厅' %}selected{% endif %}>4室2厅</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="area">面积(平米) *</label>
                    <input type="number" class="form-control" id="area" name="area" value="{{ house.area }}" required>
                </div>
                
                <div class="form-group">
                    <label for="price">月租(元) *</label>
                    <input type="number" class="form-control" id="price" name="price" value="{{ house.price }}" required>
                </div>
                
                <div class="form-group">
                    <label for="direction">朝向 *</label>
                    <select class="form-control" id="direction" name="direction" required>
                        <option value="东" {% if house.direction == '东' %}selected{% endif %}>东</option>
                        <option value="南" {% if house.direction == '南' %}selected{% endif %}>南</option>
                        <option value="西" {% if house.direction == '西' %}selected{% endif %}>西</option>
                        <option value="北" {% if house.direction == '北' %}selected{% endif %}>北</option>
                        <option value="东南" {% if house.direction == '东南' %}selected{% endif %}>东南</option>
                        <option value="东北" {% if house.direction == '东北' %}selected{% endif %}>东北</option>
                        <option value="西南" {% if house.direction == '西南' %}selected{% endif %}>西南</option>
                        <option value="西北" {% if house.direction == '西北' %}selected{% endif %}>西北</option>
                    </select>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="form-group">
                    <label for="rent_type">租住类型 *</label>
                    <select class="form-control" id="rent_type" name="rent_type" required>
                        <option value="整租" {% if house.rent_type == '整租' %}selected{% endif %}>整租</option>
                        <option value="合租" {% if house.rent_type == '合租' %}selected{% endif %}>合租</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="region">区域 *</label>
                    <input type="text" class="form-control" id="region" name="region" value="{{ house.region }}" required>
                </div>
                
                <div class="form-group">
                    <label for="block">小区 *</label>
                    <input type="text" class="form-control" id="block" name="block" value="{{ house.block }}" required>
                </div>
                
                <div class="form-group">
                    <label for="address">详细地址 *</label>
                    <input type="text" class="form-control" id="address" name="address" value="{{ house.address }}" required>
                </div>
                
                <div class="form-group">
                    <label for="traffic">交通情况</label>
                    <textarea class="form-control" id="traffic" name="traffic" rows="2">{{ house.traffic }}</textarea>
                </div>
                
                <div class="form-group">
                    <label for="sheshi">设施(用"-"分隔)</label>
                    <input type="text" class="form-control" id="sheshi" name="sheshi" value="{{ house.sheshi }}" placeholder="例: 床-宽带-洗衣机-空调">
                </div>
                
                <div class="form-group">
                    <label for="picture">房源图片</label>
                    {% if house.picture %}
                    <div class="mb-2">
                        <img src="/static/img/{{ house.picture }}" alt="当前图片" style="max-width: 200px;">
                    </div>
                    {% endif %}
                    <input type="file" class="form-control-file" id="picture" name="picture">
                    <small class="form-text text-muted">如果不上传新图片,将保留原图片</small>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">更新</button>
            <a href="{{ url_for('landlord_page.my_houses') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>
{% endblock %}
