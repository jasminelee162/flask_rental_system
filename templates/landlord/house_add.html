{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>添加房源</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="POST" action="{{ url_for('landlord_page.add_house') }}" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="title">标题 *</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="rooms">户型 *</label>
                    <select class="form-control" id="rooms" name="rooms" required>
                        <option value="1室1厅">1室1厅</option>
                        <option value="2室1厅">2室1厅</option>
                        <option value="2室2厅">2室2厅</option>
                        <option value="3室1厅">3室1厅</option>
                        <option value="3室2厅">3室2厅</option>
                        <option value="4室2厅">4室2厅</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="area">面积(平米) *</label>
                    <input type="number" class="form-control" id="area" name="area" required>
                </div>
                
                <div class="form-group">
                    <label for="price">月租(元) *</label>
                    <input type="number" class="form-control" id="price" name="price" required>
                </div>
                
                <div class="form-group">
                    <label for="direction">朝向 *</label>
                    <select class="form-control" id="direction" name="direction" required>
                        <option value="东">东</option>
                        <option value="南">南</option>
                        <option value="西">西</option>
                        <option value="北">北</option>
                        <option value="东南">东南</option>
                        <option value="东北">东北</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                    </select>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="form-group">
                    <label for="rent_type">租住类型 *</label>
                    <select class="form-control" id="rent_type" name="rent_type" required>
                        <option value="整租">整租</option>
                        <option value="合租">合租</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="region">区域 *</label>
                    <input type="text" class="form-control" id="region" name="region" required>
                </div>
                
                <div class="form-group">
                    <label for="block">小区 *</label>
                    <input type="text" class="form-control" id="block" name="block" required>
                </div>
                
                <div class="form-group">
                    <label for="address">详细地址 *</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                </div>
                
                <div class="form-group">
                    <label for="traffic">交通情况</label>
                    <textarea class="form-control" id="traffic" name="traffic" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="sheshi">设施(用"-"分隔)</label>
                    <input type="text" class="form-control" id="sheshi" name="sheshi" placeholder="例: 床-宽带-洗衣机-空调">
                </div>
                
                <div class="form-group">
                    <label for="picture">房源图片</label>
                    <input type="file" class="form-control-file" id="picture" name="picture">
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">提交</button>
            <a href="{{ url_for('landlord_page.my_houses') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>
{% endblock %}
